spring.application.name=todolist

# On utilise 3307 car c'est ce que montre ton XAMPP
spring.datasource.url=jdbc:mysql://localhost:3307/liste_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

# Sur XAMPP, par défaut, il n'y a PAS de mot de passe. Laisse vide après le =
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true